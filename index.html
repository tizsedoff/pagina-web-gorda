<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>APS Shop - Scanner</title>
    <style>
        body { background-color: #000; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; cursor: pointer; }
        .contenedor { border: 2px solid #007bff; display: inline-block; padding: 20px; border-radius: 15px; }
        input { padding: 10px; font-size: 1.2rem; margin: 10px; border-radius: 5px; }
        button { padding: 10px 20px; font-size: 1.1rem; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #imagenMeme { width: 300px; display: none; margin: 20px auto; }
    </style>
</head>
<body>
    <div class="contenedor">
        <h1>APS Developer</h1>
        <p>SISTEMA DE ESCANEO</p>
        <input type="number" id="inputPeso" placeholder="Peso en kg">
        <br>
        <button onclick="ejecutarReto()">ESCANEAR</button>
        <h2 id="mensaje"></h2>
        <img id="imagenMeme" src="">
    </div>

    <script>
        function ejecutarReto() {
            const peso = document.getElementById('inputPeso').value;
            const mensaje = document.getElementById('mensaje');
            const imagen = document.getElementById('imagenMeme');

            if (peso === "") return alert("Ingresa datos");

            imagen.style.display = "block";

            if (parseFloat(peso) > 100) {
                mensaje.innerText = "¡ERROR CRÍTICO! SOBRECARGA";
                mensaje.style.color = "#ff4444";
                // Asegurate de que los archivos se llamen exactamente así en GitHub
                imagen.src = "./image-removebg-preview.png"; 
                let audio = new Audio('./oye-gela-escuchate-esto-saturado.mp3');
                audio.play().catch(() => alert("Hacé clic en el fondo negro primero"));
            } else {
                mensaje.innerText = "Usuario autorizado";
                mensaje.style.color = "#44ff44";
                imagen.src = "https://media.giphy.com/media/l0HlBO7eyWzSZkJri/giphy.gif";
            }
        }
    </script>
</body>
</html>
